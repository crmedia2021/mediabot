# ──────────────────────────────────────────────────────────────────────
# CRMedia Bot — Ansible Inventory
# Customize this file with your server details.
#
# Usage:
#   ansible-playbook -i ansible/inventory.ini ansible/deploy.yml
# ──────────────────────────────────────────────────────────────────────

[crmedia_servers]
# production ansible_host=YOUR_SERVER_IP ansible_user=deploy ansible_port=22
# staging    ansible_host=YOUR_STAGING_IP ansible_user=deploy ansible_port=22

[crmedia_servers:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file=~/.ssh/id_rsa

# ── Convex Configuration ──
# convex_deploy_key=YOUR_CONVEX_DEPLOY_KEY
# convex_deployment=YOUR_CONVEX_DEPLOYMENT
# vite_convex_url=YOUR_VITE_CONVEX_URL

# ── Domain Configuration ──
