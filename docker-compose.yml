# ──────────────────────────────────────────────────────────────────────
# CRMedia Bot — Docker Compose
#
# Quick start:
#   docker compose up -d
#
# With Convex URL:
#   VITE_CONVEX_URL=https://your-convex.convex.cloud docker compose up -d
# ──────────────────────────────────────────────────────────────────────

services:
  crmedia-bot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_CONVEX_URL: ${VITE_CONVEX_URL:-}
    ports:
      - "${PORT:-80}:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
